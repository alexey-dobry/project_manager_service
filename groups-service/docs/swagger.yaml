basePath: /
definitions:
  github_com_student-pm_groups-service_internal_pkg_errors.Body:
    properties:
      error:
        $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Detail'
    type: object
  github_com_student-pm_groups-service_internal_pkg_errors.Detail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
    type: object
  internal_delivery_http.AddMemberRequest:
    properties:
      role_in_group:
        enum:
        - member
        - leader
        example: member
        type: string
      user_id:
        type: string
    required:
    - role_in_group
    - user_id
    type: object
  internal_delivery_http.CreateGroupRequest:
    properties:
      course:
        example: 2
        maximum: 10
        type: integer
      faculty:
        example: ФИТ
        maxLength: 120
        minLength: 2
        type: string
      leader_id:
        example: 7c0a...
        type: string
      name:
        example: БПИ-211
        maxLength: 120
        minLength: 2
        type: string
    required:
    - course
    - faculty
    - leader_id
    - name
    type: object
  internal_delivery_http.GroupResponse:
    properties:
      course:
        type: integer
      created_at:
        type: string
      faculty:
        type: string
      id:
        type: string
      leader_id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_delivery_http.MembershipResponse:
    properties:
      group_id:
        type: string
      joined_at:
        type: string
      role_in_group:
        type: string
      user_id:
        type: string
    type: object
  internal_delivery_http.MessageResponse:
    properties:
      message:
        example: ok
        type: string
    type: object
  internal_delivery_http.PaginatedGroupsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_delivery_http.GroupResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  internal_delivery_http.UpdateGroupRequest:
    properties:
      course:
        maximum: 10
        type: integer
      faculty:
        maxLength: 120
        minLength: 2
        type: string
      leader_id:
        type: string
      name:
        maxLength: 120
        minLength: 2
        type: string
    type: object
info:
  contact: {}
  description: Управление студенческими группами и членством в них.
  title: Groups Service API
  version: "1.0"
paths:
  /groups:
    get:
      parameters:
      - description: точное совпадение
        in: query
        name: faculty
        type: string
      - description: номер курса
        in: query
        name: course
        type: integer
      - description: по умолчанию 20, максимум 100
        in: query
        name: limit
        type: integer
      - description: по умолчанию 0
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http.PaginatedGroupsResponse'
      security:
      - BearerAuth: []
      summary: Список групп
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Доступно teacher/admin
      parameters:
      - description: Group payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_delivery_http.GroupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Создать группу
      tags:
      - groups
  /groups/{id}:
    delete:
      description: Только teacher/admin
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Удалить группу
      tags:
      - groups
    get:
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http.GroupResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Получить группу по ID
      tags:
      - groups
    patch:
      consumes:
      - application/json
      description: teacher/admin или текущий лидер группы
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http.UpdateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http.GroupResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Обновить группу
      tags:
      - groups
  /groups/{id}/members:
    get:
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_delivery_http.MembershipResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Список участников группы
      tags:
      - memberships
    post:
      consumes:
      - application/json
      description: Лидер группы или teacher/admin
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      - description: Member payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_delivery_http.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_delivery_http.MembershipResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Добавить участника
      tags:
      - memberships
  /groups/{id}/members/{user_id}:
    delete:
      description: Лидер группы / teacher / admin / сам себя
      parameters:
      - description: Group UUID
        in: path
        name: id
        required: true
        type: string
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_student-pm_groups-service_internal_pkg_errors.Body'
      security:
      - BearerAuth: []
      summary: Удалить участника
      tags:
      - memberships
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http.MessageResponse'
      summary: Health
      tags:
      - system
  /ready:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http.MessageResponse'
      summary: Ready
      tags:
      - system
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
