root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/projects-service ./cmd"
  bin = "./tmp/projects-service"
  delay = 500
  exclude_dir = ["bin", "tmp", "tests", "docs", "migrations"]
  include_ext = ["go"]
  kill_delay = "1s"
  send_interrupt = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
