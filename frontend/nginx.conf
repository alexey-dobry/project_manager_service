# Конфиг Nginx для production-сборки SPA
# Раздаёт статику + проксирует /api на API Gateway бэкенда

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Включаем gzip для текстовых ресурсов
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Кеширование статики (хеши в именах файлов делают это безопасным)
    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|jpg|jpeg|png|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html не кешируется — иначе пользователи получат старый bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Проксирование API на бэкенд (имя сервиса в docker-compose сети)
    # В dev можно убрать и обращаться напрямую к http://localhost:8080
    location /api/ {
        proxy_pass http://host.docker.internal:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты — учитываем долгие запросы (например, отчёты)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA-фоллбек: любой неизвестный URL отдаёт index.html,
    # дальше React Router сам решит, что показать
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрываем версию nginx
    server_tokens off;
}
